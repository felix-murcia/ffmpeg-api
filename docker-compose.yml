version: '3.8'

services:
  ffmpeg-api:
    build:
      context: ../ffmpeg-cuda
      dockerfile: Dockerfile
    container_name: ffmpeg-api-prod
    restart: unless-stopped
    gpus: all
    entrypoint: []
    command: ["python3", "/app/app.py"]
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    ports:
      - "8082:8080"
    volumes:
      - ${ADM_PATH}/ffmpeg/temp:/shared/temp
      - ${ADM_PATH}/ffmpeg/uploads:/shared/uploads
      - ${ADM_PATH}/ffmpeg/outputs:/shared/outputs
      - ${ADM_PATH}/downloads:/shared/input
      - /tmp/audios:/shared/audios
    networks:
      - cine-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  cine-network:
    external: true
