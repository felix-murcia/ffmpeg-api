version: '3.8'

services:
  ffmpeg-api:
    build:
      context: ../ffmpeg-cuda
      dockerfile: Dockerfile
    container_name: ffmpeg-api-prod
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video, compute, utility]
    entrypoint: []
    command: ["python3", "/app/app.py"]
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    ports:
      - "8082:8080"
    volumes:
      - /mnt/DATA_2TB/administracion-peliculas/ffmpeg/temp:/shared/temp
      - /mnt/DATA_2TB/administracion-peliculas/ffmpeg/uploads:/shared/uploads
      - /mnt/DATA_2TB/administracion-peliculas/ffmpeg/outputs:/shared/outputs
      - /mnt/DATA_2TB/administracion-peliculas/downloads:/shared/input
      - /tmp/audios:/tmp/audios
      - /tmp/videos:/tmp/videos
      - /tmp/images:/tmp/images
      - /tmp/data:/app/data
      - /tmp/data/cache:/app/data/cache
    networks:
      - cine-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  cine-network:
    external: true